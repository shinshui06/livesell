<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIP LIVE — Shop Now</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0C0C0F;
  --surface:#141417;
  --surface2:#1C1C21;
  --surface3:#242429;
  --border:#2A2A30;
  --border2:#333339;
  --accent:#C8FF3E;
  --accent-dark:#A8E020;
  --live:#FF3B3B;
  --text:#F2F2F5;
  --text2:#9999A8;
  --text3:#5A5A68;
  --danger:#FF4D4D;
  --danger-bg:rgba(255,77,77,.1);
  --success:#39D353;
  --success-bg:rgba(57,211,83,.08);
  --r:12px;
  --r-sm:8px;
  --r-pill:999px;
  --font-head:'Syne',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --shadow-lg:0 8px 40px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* INPUTS */
input,textarea,select{
  width:100%;padding:10px 14px;
  border-radius:var(--r-sm);
  border:1px solid var(--border2);
  background:var(--surface2);
  color:var(--text);
  font-size:14px;font-family:var(--font-body);
  transition:border-color .15s,box-shadow .15s;
  outline:none;
}
input:focus,textarea:focus,select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(200,255,62,.12);
}
input::placeholder,textarea::placeholder{color:var(--text3)}
select option{background:var(--surface2);color:var(--text)}

/* BUTTONS */
.btn{
  padding:9px 18px;border-radius:var(--r-sm);
  border:1px solid var(--border2);
  background:transparent;color:var(--text2);
  font-size:13px;font-family:var(--font-body);font-weight:500;
  cursor:pointer;transition:all .15s;letter-spacing:.01em;
}
.btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#0C0C0F;border-color:transparent;font-weight:700;letter-spacing:.02em}
.btn-primary:hover{background:var(--accent-dark);color:#0C0C0F}
.btn-danger{color:var(--danger);border-color:rgba(255,77,77,.3)}
.btn-danger:hover{background:var(--danger-bg);color:var(--danger)}
.btn-sm{padding:6px 13px;font-size:12px}
.btn-icon{
  padding:8px;border-radius:var(--r-sm);
  border:1px solid var(--border);
  background:transparent;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  transition:all .15s;color:var(--text2);
}
.btn-icon:hover{background:var(--surface2);color:var(--text)}

/* LABEL / FIELD */
.field{margin-bottom:14px}
.field label{font-size:11px;color:var(--text2);display:block;margin-bottom:6px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.err-msg{font-size:12px;color:var(--danger);margin-top:5px}

/* ──────────── HERO ──────────── */
.hero{
  border-radius:var(--r);
  margin-bottom:24px;
  overflow:hidden;
  position:relative;
  background:var(--surface);
  border:1px solid var(--border);
  padding:32px 32px 28px;
  display:flex;align-items:center;justify-content:space-between;gap:20px;
}
/* Subtle grid pattern overlay */
.hero::before{
  content:'';position:absolute;inset:0;
  background-image:
    linear-gradient(var(--border) 1px,transparent 1px),
    linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;
  opacity:.3;pointer-events:none;
}
/* Accent glow blob */
.hero::after{
  content:'';position:absolute;
  width:300px;height:300px;
  background:radial-gradient(circle,rgba(200,255,62,.12) 0%,transparent 70%);
  top:-80px;right:-40px;pointer-events:none;
}
.hero-left{position:relative;z-index:1}
.hero-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.live-pill{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,59,59,.15);
  color:#FF7070;
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:5px 12px;border-radius:var(--r-pill);
  border:1px solid rgba(255,59,59,.25);
}
.live-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--live);
  animation:blink 1.1s ease-in-out infinite;
  box-shadow:0 0 6px var(--live);
}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.hero-title{
  font-family:var(--font-head);
  font-size:clamp(28px,5vw,42px);font-weight:800;
  color:var(--text);line-height:1.05;letter-spacing:-.02em;
  margin-bottom:8px;
}
.hero-title .hl{color:var(--accent)}
.hero-sub{font-size:13px;color:var(--text2);line-height:1.6;max-width:340px}
.hero-right{
  display:flex;gap:28px;flex-shrink:0;position:relative;z-index:1;
}
.hero-stat{text-align:center}
.hero-stat-num{
  font-family:var(--font-head);
  font-size:32px;font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1;
}
.hero-stat-num.accent{color:var(--accent)}
.hero-stat-lbl{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.hero-divider{width:1px;background:var(--border2);align-self:stretch}

/* ──────────── TOOLBAR ──────────── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.search-wrap{flex:1;min-width:160px;position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-wrap input{padding-left:36px;background:var(--surface2);border-color:var(--border)}
.search-wrap input:focus{background:var(--surface2)}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.fpill{
  padding:6px 14px;border-radius:var(--r-pill);
  border:1px solid var(--border);
  font-size:12px;font-weight:600;letter-spacing:.04em;
  cursor:pointer;background:transparent;
  color:var(--text2);font-family:var(--font-body);
  transition:all .15s;
}
.fpill:hover{border-color:var(--border2);color:var(--text)}
.fpill.active{background:var(--accent);color:#0C0C0F;border-color:transparent}

/* ──────────── GRID ──────────── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}

/* ──────────── CARD ──────────── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;
  cursor:pointer;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1), border-color .2s, box-shadow .2s;
  position:relative;
}
.card:hover{
  border-color:var(--border2);
  transform:translateY(-4px);
  box-shadow:var(--shadow);
}
.card:active{transform:translateY(-1px)}
.card-img-wrap{
  width:100%;height:220px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.card-img-wrap img{width:100%;height:220px;object-fit:cover;display:block;transition:transform .4s ease}
.card:hover .card-img-wrap img{transform:scale(1.04)}
.card-img-placeholder{font-size:56px;opacity:.15;user-select:none}
.img-count-badge{
  position:absolute;bottom:10px;right:10px;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  color:#fff;font-size:11px;font-weight:600;
  padding:3px 8px;border-radius:var(--r-pill);
  display:flex;align-items:center;gap:4px;
  border:1px solid rgba(255,255,255,.08);
}
.sold-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.6);backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;
}
.sold-stamp{
  background:var(--danger);color:#fff;
  font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:7px 20px;border-radius:var(--r-pill);
  transform:rotate(-8deg);
  box-shadow:0 4px 16px rgba(255,77,77,.4);
}
.card-body{padding:14px 16px 16px}
.card-tag{
  display:inline-block;
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);margin-bottom:8px;
}
.card-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px}
.card-name{font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--text);line-height:1.2;letter-spacing:-.01em}
.card-price{
  font-family:var(--font-head);
  font-size:16px;font-weight:800;
  color:var(--accent);white-space:nowrap;letter-spacing:-.01em;
}
.card-desc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px}
.card-sizes{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.size-chip{
  font-size:10px;font-weight:700;letter-spacing:.05em;
  padding:3px 8px;border-radius:4px;
  border:1px solid var(--border2);
  color:var(--text2);background:var(--surface2);
}
.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--border);
  padding-top:10px;margin-top:4px;
}
.stock-badge{display:flex;align-items:center;gap:5px}
.stock-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.stock-dot.in{background:var(--success);box-shadow:0 0 6px rgba(57,211,83,.5)}
.stock-dot.out{background:var(--danger);box-shadow:0 0 6px rgba(255,77,77,.4)}
.stock-txt{font-size:11px;font-weight:600}
.stock-txt.in{color:var(--success)}
.stock-txt.out{color:var(--danger)}
.card-admin-row{
  display:flex;gap:6px;margin-top:10px;
  border-top:1px solid var(--border);padding-top:10px;
}

/* ──────────── MODALS ──────────── */
.modal-outer{
  position:fixed;inset:0;
  background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  display:flex;align-items:flex-start;justify-content:center;
  z-index:100;padding:20px;overflow-y:auto;
}

/* DETAIL MODAL */
.modal-box{
  background:var(--surface);
  border-radius:var(--r);width:100%;max-width:500px;
  overflow:hidden;border:1px solid var(--border2);
  box-shadow:var(--shadow-lg);margin:auto;
  animation:modalIn .25s cubic-bezier(.34,1.4,.64,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.det-img-area{
  width:100%;height:300px;
  background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
}
.det-img-area img{width:100%;height:300px;object-fit:cover;display:block}
.det-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:50%;width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;color:#fff;font-size:18px;
  transition:background .15s;
}
.det-arrow:hover{background:rgba(0,0,0,.85)}
.det-arrow.prev{left:12px}.det-arrow.next{right:12px}
.det-thumb-strip{
  display:flex;gap:8px;padding:12px 16px;
  border-bottom:1px solid var(--border);overflow-x:auto;
}
.dthumb{
  width:56px;height:56px;border-radius:var(--r-sm);
  object-fit:cover;cursor:pointer;
  border:2px solid transparent;flex-shrink:0;
  background:var(--surface2);transition:border-color .12s;opacity:.6;
}
.dthumb.active{border-color:var(--accent);opacity:1}
.det-body{padding:20px}
.det-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.det-name{font-family:var(--font-head);font-size:22px;font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1.1}
.det-price{font-family:var(--font-head);font-size:24px;font-weight:800;color:var(--accent);letter-spacing:-.02em;white-space:nowrap}
.det-stock{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  padding:4px 12px;border-radius:var(--r-pill);margin-bottom:12px;
}
.det-stock.in{background:var(--success-bg);color:var(--success);border:1px solid rgba(57,211,83,.2)}
.det-stock.out{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(255,77,77,.2)}
.det-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:16px}
.size-label{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.det-sizes{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.det-size-info{
  padding:7px 15px;border-radius:var(--r-sm);
  border:1px solid var(--border2);
  font-size:13px;font-weight:700;letter-spacing:.04em;
  background:var(--surface2);color:var(--text2);
  font-family:var(--font-body);cursor:default;
  user-select:none;
}
.det-size{
  padding:7px 15px;border-radius:var(--r-sm);
  border:1px solid var(--border2);
  font-size:13px;font-weight:700;letter-spacing:.04em;
  cursor:pointer;background:var(--surface2);
  color:var(--text);font-family:var(--font-body);
  transition:all .12s;
}
.det-size:hover{border-color:var(--accent);color:var(--accent)}
.det-size.sel{background:var(--accent);color:#0C0C0F;border-color:transparent}
.det-cta{
  width:100%;padding:13px;border-radius:var(--r-sm);
  background:var(--accent);color:#0C0C0F;
  border:none;font-size:14px;font-weight:800;
  letter-spacing:.04em;text-transform:uppercase;
  cursor:pointer;font-family:var(--font-head);
  transition:background .15s,opacity .15s;
}
.det-cta:hover{background:var(--accent-dark)}
.det-cta:disabled{background:var(--surface3);color:var(--text3);cursor:not-allowed}
.det-close{
  position:absolute;top:12px;right:12px;
  background:rgba(0,0,0,.5);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:50%;width:32px;height:32px;
  color:#fff;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;z-index:3;
  transition:background .15s;
}
.det-close:hover{background:rgba(0,0,0,.8)}

/* ORDER INSTRUCTIONS MODAL */
.order-modal{
  background:var(--surface);
  border-radius:var(--r);width:100%;max-width:480px;
  border:1px solid var(--border2);overflow:hidden;
  box-shadow:var(--shadow-lg);margin:auto;
  animation:modalIn .28s cubic-bezier(.34,1.4,.64,1);
}
.order-head{
  padding:20px 22px 16px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.order-head-left{display:flex;align-items:center;gap:10px}
.order-icon-wrap{
  width:40px;height:40px;border-radius:50%;
  background:rgba(200,255,62,.12);
  border:1px solid rgba(200,255,62,.25);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
}
.order-title{font-family:var(--font-head);font-size:17px;font-weight:800;color:var(--text);letter-spacing:-.01em}
.order-subtitle{font-size:12px;color:var(--text2);margin-top:2px}
.order-shirt-info{
  margin:0 22px 0;
  padding:14px 16px;
  background:var(--surface2);
  border-radius:var(--r-sm);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin-top:16px;margin-bottom:0;
}
.order-shirt-name{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.order-shirt-price{font-family:var(--font-head);font-size:16px;font-weight:800;color:var(--accent)}
.order-shirt-sizes{font-size:11px;color:var(--text3);margin-top:3px;font-weight:500}
.order-steps{padding:18px 22px;display:flex;flex-direction:column;gap:0}
.order-step{display:flex;gap:14px;position:relative;padding-bottom:22px}
.order-step:last-child{padding-bottom:0}
.order-step:not(:last-child)::after{
  content:'';position:absolute;left:18px;top:38px;bottom:0;
  width:1px;background:var(--border2);
}
.step-num{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:var(--surface2);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-head);font-size:14px;font-weight:800;color:var(--text2);
  position:relative;z-index:1;
}
.step-num.accent{background:var(--accent);color:#0C0C0F;border-color:transparent}
.step-content{padding-top:6px;flex:1}
.step-title{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.01em;margin-bottom:5px}
.step-desc{font-size:13px;color:var(--text2);line-height:1.65}
.step-note{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:8px;
  background:var(--danger-bg);
  border:1px solid rgba(255,77,77,.2);
  border-radius:var(--r-sm);
  padding:6px 10px;
  font-size:12px;font-weight:600;color:var(--danger);
}
.step-note-green{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:8px;
  background:var(--success-bg);
  border:1px solid rgba(57,211,83,.15);
  border-radius:var(--r-sm);
  padding:6px 10px;
  font-size:12px;font-weight:600;color:var(--success);
}
.order-foot{
  padding:16px 22px;
  border-top:1px solid var(--border);
  display:flex;gap:10px;
  background:var(--surface2);
}
.order-cta{
  flex:1;padding:13px;border-radius:var(--r-sm);
  background:var(--accent);color:#0C0C0F;
  border:none;font-size:13px;font-weight:800;
  letter-spacing:.04em;text-transform:uppercase;
  cursor:pointer;font-family:var(--font-head);
  transition:background .15s;
}
.order-cta:hover{background:var(--accent-dark)}

/* FORM MODAL */
.form-modal{
  background:var(--surface);
  border-radius:var(--r);width:100%;max-width:420px;
  border:1px solid var(--border2);overflow:hidden;
  box-shadow:var(--shadow-lg);margin:auto;
  animation:modalIn .25s cubic-bezier(.34,1.4,.64,1);
}
.form-head{
  padding:18px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.form-title{font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.form-body{padding:18px 20px;max-height:70vh;overflow-y:auto}
.form-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

.upload-zone{
  border:1px dashed var(--border2);
  border-radius:var(--r-sm);padding:16px;
  text-align:center;cursor:pointer;
  color:var(--text2);font-size:13px;
  transition:all .15s;background:var(--surface2);
  display:block;
}
.upload-zone:hover{border-color:var(--accent);color:var(--accent);background:rgba(200,255,62,.04)}
.thumb-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.thumb-edit{
  width:58px;height:58px;border-radius:var(--r-sm);
  object-fit:cover;border:1px solid var(--border2);
  background:var(--surface2);
}

/* KEY MODAL */
.key-card{
  background:var(--surface);
  border:1px solid var(--border2);border-radius:var(--r);
  padding:32px 28px;max-width:340px;
  margin:auto;text-align:center;
  box-shadow:var(--shadow-lg);
  animation:modalIn .25s cubic-bezier(.34,1.4,.64,1);
}
.key-icon{
  width:56px;height:56px;border-radius:50%;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;font-size:22px;
}

/* TOAST */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--text);color:var(--bg);
  padding:11px 22px;border-radius:var(--r-pill);
  font-size:13px;font-weight:700;letter-spacing:.02em;
  white-space:nowrap;z-index:999;
  animation:toastIn .3s cubic-bezier(.34,1.4,.64,1);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  pointer-events:none;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* EMPTY */
.empty{
  text-align:center;padding:72px 20px;color:var(--text3);
  grid-column:1/-1;
}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:.25}
.empty-title{font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--text2);margin-bottom:6px}
.empty-sub{font-size:13px}

/* SECTION TITLE */
.section-bar{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:16px;
}
.section-title{
  font-family:var(--font-head);
  font-size:13px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--text3);
}
.section-count{
  font-size:12px;color:var(--text3);font-weight:600;
}

/* SETUP BANNER */
.setup-banner{
  border-radius:var(--r);
  border:1px solid rgba(200,255,62,.25);
  background:rgba(200,255,62,.06);
  padding:18px 20px;
  margin-bottom:20px;
  display:flex;gap:14px;align-items:flex-start;
}
.setup-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.setup-title{font-family:var(--font-head);font-size:14px;font-weight:800;color:var(--accent);margin-bottom:4px;letter-spacing:-.01em}
.setup-text{font-size:12px;color:var(--text2);line-height:1.7}
.setup-text code{background:var(--surface2);border:1px solid var(--border2);border-radius:4px;padding:1px 6px;font-size:11px;color:var(--accent);font-family:monospace}
.setup-text ol{padding-left:16px;margin-top:6px}
.setup-text li{margin-bottom:4px}

/* LOADING */
.loading-wrap{text-align:center;padding:72px 20px}
.spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ──────────── SELLER DASHBOARD ──────────── */
.seller-dash{
  margin-top:32px;
  border-top:1px solid var(--border);
  padding-top:28px;
}
.dash-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;gap:12px;flex-wrap:wrap;
}
.dash-title{
  font-family:var(--font-head);font-size:18px;font-weight:800;
  color:var(--text);letter-spacing:-.02em;
  display:flex;align-items:center;gap:8px;
}
.dash-title-badge{
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  background:rgba(200,255,62,.15);color:var(--accent);
  border:1px solid rgba(200,255,62,.25);border-radius:var(--r-pill);
  padding:3px 10px;
}
.dash-actions{display:flex;gap:8px;flex-wrap:wrap;}

/* STATS ROW */
.dash-stats{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;margin-bottom:20px;
}
.dstat{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:16px 18px;
}
.dstat-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.dstat-val{font-family:var(--font-head);font-size:26px;font-weight:800;color:var(--text);letter-spacing:-.02em;line-height:1}
.dstat-val.accent{color:var(--accent)}
.dstat-sub{font-size:11px;color:var(--text3);margin-top:4px}

/* CHART PANEL */
.chart-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:20px 22px;margin-bottom:20px;
}
.chart-panel-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:18px;gap:10px;flex-wrap:wrap;
}
.chart-panel-title{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.chart-range-pills{display:flex;gap:5px;}
.crpill{
  padding:4px 12px;border-radius:var(--r-pill);
  border:1px solid var(--border);font-size:11px;font-weight:600;letter-spacing:.04em;
  cursor:pointer;background:transparent;color:var(--text2);
  font-family:var(--font-body);transition:all .12s;
}
.crpill:hover{border-color:var(--border2);color:var(--text)}
.crpill.active{background:var(--accent);color:#0C0C0F;border-color:transparent}
@keyframes chartFlash{
  0%{box-shadow:0 0 0 0 rgba(200,255,62,0);border-color:var(--border)}
  25%{box-shadow:0 0 0 5px rgba(200,255,62,.18),inset 0 0 28px rgba(200,255,62,.04);border-color:rgba(200,255,62,.4)}
  100%{box-shadow:0 0 0 0 rgba(200,255,62,0);border-color:var(--border)}
}
.chart-flash{animation:chartFlash .9s ease-out forwards}
.chart-live-dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--accent);margin-right:5px;
  box-shadow:0 0 5px rgba(200,255,62,.6);
  animation:blink 1.6s ease-in-out infinite;
}
#chart-last-updated{font-size:10px;color:var(--text3);font-weight:500;margin-left:8px;transition:color .3s}
#chart-last-updated.just-updated{color:var(--accent)}
.chart-wrap{position:relative;height:220px;width:100%}
canvas#sales-chart{width:100%!important;height:220px!important}

/* LOG PANEL */
.log-panel{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:20px 22px;margin-bottom:20px;
}
.log-panel-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;gap:10px;
}
.log-panel-title{font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.log-list{display:flex;flex-direction:column;gap:0;max-height:320px;overflow-y:auto;}
.log-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 0;border-bottom:1px solid var(--border);
  font-size:13px;
}
.log-item:last-child{border-bottom:none}
.log-icon{
  width:28px;height:28px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  background:var(--surface2);border:1px solid var(--border);
}
.log-icon.add{background:rgba(57,211,83,.1);border-color:rgba(57,211,83,.2)}
.log-icon.edit{background:rgba(200,255,62,.1);border-color:rgba(200,255,62,.2)}
.log-icon.del{background:rgba(255,77,77,.1);border-color:rgba(255,77,77,.2)}
.log-icon.sale{background:rgba(200,255,62,.12);border-color:rgba(200,255,62,.25)}
.log-icon.lock{background:rgba(153,153,168,.1);border-color:rgba(153,153,168,.2)}
.log-meta{flex:1;min-width:0}
.log-action{color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-time{font-size:11px;color:var(--text3);margin-top:2px}
.log-empty{text-align:center;padding:28px;color:var(--text3);font-size:13px}

/* RECORD SALE MODAL */
.sale-modal{
  background:var(--surface);
  border-radius:var(--r);width:100%;max-width:400px;
  border:1px solid var(--border2);overflow:hidden;
  box-shadow:var(--shadow-lg);margin:auto;
  animation:modalIn .25s cubic-bezier(.34,1.4,.64,1);
}
.sale-head{
  padding:18px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.sale-body{padding:18px 20px}
.sale-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ──────────── PRINT STYLES ──────────── */
@media print{
  body{background:#fff!important;color:#000!important}
  #app > *:not(.seller-dash){display:none!important}
  .seller-dash{border:none!important;padding-top:0!important;margin-top:0!important}
  .dash-actions,.log-panel-head button,.chart-range-pills,.btn,.btn-icon{display:none!important}
  .chart-panel,.log-panel,.dash-stats,.dstat{
    background:#fff!important;border:1px solid #ccc!important;
    break-inside:avoid;
  }
  .dstat-val,.dstat-lbl,.log-action,.log-time,.chart-panel-title,.log-panel-title,.dash-title{color:#000!important}
  .log-item{border-bottom:1px solid #ddd!important}
  .log-list{max-height:none!important;overflow:visible!important}
  canvas#sales-chart{max-width:100%!important}
  .print-header{display:block!important}
}
</style>

<body>
<div id="app" style="max-width:1100px;margin:0 auto;padding:24px 20px;position:relative;min-height:100vh"></div>

<script>
/* ============================================================
   🔐 SELLER KEY — Change this to your own secret password!
   Do NOT share this file publicly with a real password in it.
   For production, move key validation to a backend/Firebase rule.
   ============================================================ */
const KEY = localStorage.getItem('driplive_key') || 'LIVE2025';
// ^ You can also just hardcode your own: const KEY = 'MyShopPass2025';

/* ============================================================
   🔥 FIREBASE CONFIG — paste your own values here
   Steps: console.firebase.google.com → Realtime Database → Test Mode
   ============================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAEiTkUxMmK4FOc31m-02dP5SDibSYhMaE",
  authDomain: "liveselling-d91b4.firebaseapp.com",
  databaseURL: "https://liveselling-d91b4-default-rtdb.firebaseio.com",
  projectId: "liveselling-d91b4",
  storageBucket: "liveselling-d91b4.firebasestorage.app",
  messagingSenderId: "269088727615",
  appId: "1:269088727615:web:9b162ed2986f1509720e8a"
};

const FB_READY = Object.values(FIREBASE_CONFIG).every(v => v && !v.startsWith('PASTE_'));

const DEFAULT_SHIRTS=[
  {id:1,name:'Classic White Tee',price:'₱350',sizes:['S','M','L','XL'],desc:'Premium 100% cotton. Breathable and comfortable for everyday wear.',stock:'in',imgs:[],tag:'Basics'},
  {id:2,name:'Oversized Drop Shoulder',price:'₱520',sizes:['M','L','XL','2XL'],desc:'Trendy oversized fit. Washed black with subtle texture.',stock:'in',imgs:[],tag:'Oversized'},
  {id:3,name:'Vintage Graphic Polo',price:'₱480',sizes:['S','M','L'],desc:'Retro-inspired graphic print. Limited run — grab yours now!',stock:'out',imgs:[],tag:'Graphics'},
  {id:4,name:'Linen Button-Up',price:'₱650',sizes:['S','M','L','XL'],desc:'Lightweight linen blend, perfect for warm weather.',stock:'in',imgs:[],tag:'Tops'},
];

let S={
  unlocked:false,filter:'All',search:'',
  selSize:{},detailImg:0,detail:null,
  showOrder:false,
  modal:null,editId:null,
  form:{name:'',price:'',sizes:[],desc:'',stock:'in',tag:'',imgs:[]},
  keyInput:'',keyErr:'',
  toast:null,toastTimer:null,
  loading:true,
  shirts:[],
  // Seller dashboard
  chartRange:'7d',
  showSaleModal:false,
  // FIX #7: added customName to saleForm so it persists across re-renders
  saleForm:{shirt:'',amount:'',qty:'1',note:'',customName:''},
};

// ── Activity Log — Firebase-synced ──
let logRef=null; // Firebase ref for activity log

function loadLog(){try{return JSON.parse(localStorage.getItem('driplive_log')||'[]');}catch(e){return[];}}
function saveLog(log){try{localStorage.setItem('driplive_log',JSON.stringify(log.slice(0,200)));}catch(e){}}
function addLog(type,action){
  const entry={type,action,ts:Date.now()};
  const log=loadLog();
  log.unshift(entry);
  saveLog(log);
  // FIX: also push log to Firebase so all devices see it
  if(FB_READY&&logRef){
    logRef.push(entry).catch(e=>console.warn('Log sync failed:',e));
  }
}

// ── Sales Data — Firebase-synced ──
let salesRef=null; // Firebase ref for sales

function loadSales(){try{return JSON.parse(localStorage.getItem('driplive_sales')||'[]');}catch(e){return[];}}
function saveSales(sales){
  try{localStorage.setItem('driplive_sales',JSON.stringify(sales));}catch(e){}
  // FIX: sync sales to Firebase
  if(FB_READY&&salesRef){
    const obj={};
    sales.forEach(s=>{obj[s.date.replace(/-/g,'_')]=s;});
    salesRef.set(obj).catch(e=>console.warn('Sales sync failed:',e));
  }
}

function addSale(shirtName,amount,qty){
  const sales=loadSales();
  const today=dateKey(new Date());
  const idx=sales.findIndex(s=>s.date===today);
  if(idx>=0){sales[idx].total+=amount*qty;sales[idx].count+=qty;}
  else{sales.push({date:today,total:amount*qty,count:qty});}
  saveSales(sales);
  addLog('sale',`Sold ${qty}x "${shirtName}" — ₱${(amount*qty).toLocaleString()}`);
  refreshChart();
}

function dateKey(d){return d.toISOString().slice(0,10);}
function fmtDateLabel(dateStr){
  const d=new Date(dateStr+'T00:00:00');
  return d.toLocaleDateString('en-PH',{month:'short',day:'numeric'});
}

function getChartData(range){
  const days=range==='7d'?7:range==='14d'?14:30;
  const sales=loadSales();
  const stockHistory=loadStockHistory();
  const labels=[],data=[],counts=[],stockLine=[];
  const stockMap={};
  stockHistory.forEach(h=>{stockMap[h.date]=h.count;});
  const windowStart=dateKey(new Date(Date.now()-(days-1)*864e5));
  let lastKnownStock=null;
  const allDates=Object.keys(stockMap).sort();
  for(const d of allDates){if(d<windowStart)lastKnownStock=stockMap[d];}
  const liveCount=S.shirts.filter(s=>s.stock==='in').length;
  for(let i=days-1;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const key=dateKey(d);
    labels.push(fmtDateLabel(key));
    const found=sales.find(s=>s.date===key);
    data.push(found?found.total:0);
    counts.push(found?found.count:0);
    if(stockMap[key]!==undefined)lastKnownStock=stockMap[key];
    // FIX #9: use snapshot for today too if available, else use liveCount
    stockLine.push(stockMap[key]!==undefined?stockMap[key]:(i===0?liveCount:(lastKnownStock!==null?lastKnownStock:null)));
  }
  return{labels,data,counts,stockLine};
}

function dashStats(){
  const sales=loadSales();
  const today=dateKey(new Date());
  const todayRec=sales.find(s=>s.date===today);
  const todayTotal=todayRec?todayRec.total:0;
  const todayCount=todayRec?todayRec.count:0;
  const allTotal=sales.reduce((a,s)=>a+s.total,0);
  const allCount=sales.reduce((a,s)=>a+s.count,0);
  // FIX #6: use < 7 (strictly less than) to avoid including 8 calendar days
  const days7=sales.filter(s=>{const d=new Date(s.date+'T00:00:00');const n=new Date();return(n-d)/(864e5)<7;});
  const week7=days7.reduce((a,s)=>a+s.total,0);
  return{todayTotal,todayCount,allTotal,allCount,week7};
}

/* ── Firebase setup — shirts, sales, log all synced ── */
let dbRef=null;
if(FB_READY){
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    const db=firebase.database();

    // Shirts ref
    dbRef=db.ref('shirts');
    dbRef.on('value',snap=>{
      const val=snap.val();
      S.shirts=val?Object.values(val):DEFAULT_SHIRTS;
      if(!val){saveShirts();}
      S.loading=false;
      saveStockSnapshot();
      r();
    },err=>{
      console.error('Firebase shirts error:',err);
      S.shirts=DEFAULT_SHIRTS;
      S.loading=false;
      showToast('⚠️ Could not connect to database.');
      r();
    });

    // Sales ref — listen for real-time updates from other devices
    salesRef=db.ref('sales');
    salesRef.on('value',snap=>{
      const val=snap.val();
      if(val){
        // Convert Firebase object back to array, keyed by date
        const arr=Object.values(val).map(s=>({...s,date:s.date}));
        try{localStorage.setItem('driplive_sales',JSON.stringify(arr));}catch(e){}
        if(S.unlocked)refreshChart();
      }
    });

    // Log ref — listen for real-time log updates
    logRef=db.ref('log');
    logRef.orderByChild('ts').limitToLast(200).on('value',snap=>{
      const val=snap.val();
      if(val){
        const arr=Object.values(val).sort((a,b)=>b.ts-a.ts);
        try{localStorage.setItem('driplive_log',JSON.stringify(arr));}catch(e){}
        // Re-render log panel if dashboard is visible
        const logEl=document.querySelector('.log-list, .log-empty');
        if(logEl&&S.unlocked){
          const panel=document.querySelector('.log-panel');
          if(panel){
            const countEl=panel.querySelector('span[style]');
            if(countEl)countEl.textContent=arr.length+' entries';
            const listWrap=panel.querySelector('.log-panel-head + div, .log-empty');
            if(listWrap)listWrap.outerHTML=logListHtml();
          }
        }
      }
    });

    // Stock history ref — sync snapshots
    db.ref('stockHistory').on('value',snap=>{
      const val=snap.val();
      if(val){
        const arr=Object.values(val).sort((a,b)=>a.date<b.date?-1:1);
        try{localStorage.setItem('driplive_stock',JSON.stringify(arr));}catch(e){}
      }
    });

  }catch(e){
    console.error('Firebase init error:',e);
    loadFallback();
  }
} else {
  loadFallback();
}

function loadFallback(){
  try{
    const saved=localStorage.getItem('driplive_shirts');
    S.shirts=saved?JSON.parse(saved):DEFAULT_SHIRTS;
  }catch(e){S.shirts=DEFAULT_SHIRTS;}
  S.loading=false;
  saveStockSnapshot();
}

// ── Stock History — Firebase-synced ──
let stockHistoryRef=null;
function loadStockHistory(){try{return JSON.parse(localStorage.getItem('driplive_stock')||'[]');}catch(e){return[];}}
function saveStockSnapshot(){
  const today=dateKey(new Date());
  const inStock=S.shirts.filter(s=>s.stock==='in').length;
  const history=loadStockHistory();
  const idx=history.findIndex(h=>h.date===today);
  if(idx>=0){history[idx].count=inStock;}
  else{history.push({date:today,count:inStock});}
  const trimmed=history.slice(-90);
  try{localStorage.setItem('driplive_stock',JSON.stringify(trimmed));}catch(e){}
  // FIX: sync stock snapshots to Firebase
  if(FB_READY&&dbRef){
    const db=firebase.database();
    const key=today.replace(/-/g,'_');
    db.ref('stockHistory/'+key).set({date:today,count:inStock}).catch(e=>console.warn('Stock snapshot sync failed:',e));
  }
}

function saveShirts(){
  saveStockSnapshot();
  if(FB_READY&&dbRef){
    const obj={};
    S.shirts.forEach(sh=>{obj[sh.id]=sh;});
    dbRef.set(obj)
      .then(()=>refreshChart())
      .catch(e=>showToast('⚠️ Save failed: '+e.message));
  } else {
    try{
      localStorage.setItem('driplive_shirts',JSON.stringify(S.shirts));
      refreshChart();
    }catch(e){showToast('⚠️ Storage full! Use smaller images.');}
  }
}

function tags(){return['All',...new Set(S.shirts.map(s=>s.tag||'Other'))];}
function filtered(){
  return S.shirts.filter(sh=>{
    const mT=S.filter==='All'||sh.tag===S.filter;
    const q=S.search.toLowerCase();
    return mT&&(!q||sh.name.toLowerCase().includes(q)||sh.desc.toLowerCase().includes(q));
  });
}

function heroHtml(){
  const ins=S.shirts.filter(s=>s.stock==='in').length;
  return `<div class="hero">
    <div class="hero-left">
      <div class="hero-eyebrow">
        <span class="live-pill"><span class="live-dot"></span> Live now</span>
      </div>
      <div class="hero-title">Shop our<br><span class="hl">latest drops.</span></div>
      <div class="hero-sub">Fresh styles added daily — tap any item to explore sizes and order.</div>
    </div>
    <div class="hero-right">
      <div class="hero-stat">
        <div class="hero-stat-num">${S.shirts.length}</div>
        <div class="hero-stat-lbl">Styles</div>
      </div>
      <div class="hero-divider"></div>
      <div class="hero-stat">
        <div class="hero-stat-num accent">${ins}</div>
        <div class="hero-stat-lbl">In Stock</div>
      </div>
    </div>
  </div>`;
}

function toolbarHtml(){
  return `<div class="toolbar">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search-inp" placeholder="Search styles…" value="${escHtml(S.search)}">
    </div>
    <div class="filter-pills">${tags().map(t=>`<button class="fpill${S.filter===t?' active':''}" data-tag="${t}">${t}</button>`).join('')}</div>
    ${S.unlocked
      ?`<button class="btn btn-primary btn-sm" id="btn-add" style="white-space:nowrap">+ Add Shirt</button>
        <button class="btn btn-sm" id="btn-lock" title="Lock seller mode">🔒</button>`
      :`<button class="btn btn-sm" id="btn-unlock">🔑 Seller</button>`}
  </div>`;
}

function cardHtml(sh){
  const imgs=sh.imgs||[];
  const imgEl=imgs.length
    ?`<img src="${imgs[0]}" alt="${escHtml(sh.name)}" loading="lazy">${imgs.length>1?`<div class="img-count-badge"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m3 9 4-4 4 4 4-4 4 4"/></svg> ${imgs.length}</div>`:''}`
    :`<span class="card-img-placeholder">👕</span>`;
  const sold=sh.stock==='out'?`<div class="sold-overlay"><span class="sold-stamp">Sold Out</span></div>`:'';
  return `<div class="card" data-view="${sh.id}">
    <div class="card-img-wrap">${imgEl}${sold}</div>
    <div class="card-body">
      ${sh.tag?`<div class="card-tag">${escHtml(sh.tag)}</div>`:''}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// FIX #11: showToast no longer triggers a full r() on timeout — only updates toast element
function showToast(msg){
  if(S.toastTimer)clearTimeout(S.toastTimer);
  S.toast=msg;
  // Update only the toast element if it exists, else full render once
  let toastEl=document.querySelector('.toast');
  if(!toastEl){
    // No toast yet — append one without full re-render
    const app=document.getElementById('app');
    const div=document.createElement('div');
    div.className='toast';
    div.textContent=msg;
    app.appendChild(div);
    toastEl=div;
  } else {
    toastEl.textContent=msg;
  }
  S.toastTimer=setTimeout(()=>{
    S.toast=null;
    const el=document.querySelector('.toast');
    if(el)el.remove();
  },2400);
}

function readFiles(files,cb){
  const res=[];let done=0;
  if(!files.length)return cb([]);
  Array.from(files).forEach((f,i)=>{
    const rd=new FileReader();
    rd.onload=e=>{res[i]=e.target.result;done++;if(done===files.length)cb(res);};
    rd.readAsDataURL(f);
  });
}
function bindThumbDel(){
  document.querySelectorAll('[data-ri]').forEach(b=>b.addEventListener('click',e=>{
    e.preventDefault();e.stopPropagation();
    S.form.imgs.splice(+b.dataset.ri,1);
    const tr=g('thumb-row');if(!tr)return;
    tr.innerHTML=S.form.imgs.map((src,j)=>`
      <div style="position:relative;display:inline-block">
        <img src="${src}" class="thumb-edit">
        <button data-ri="${j}" style="position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;background:#FF4D4D;border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;font-weight:700">✕</button>
      </div>`).join('');
    bindThumbDel();
  }));
}

  bindThumbDel();
  document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',e=>{

  }));
  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();
    if(!confirm('Remove this shirt?'))return;
    const sh=S.shirts.find(s=>s.id==b.dataset.del);
    const nm=sh?sh.name:'item';
    S.shirts=S.shirts.filter(s=>s.id!=b.dataset.del);saveShirts();showToast('Shirt removed.');addLog('del',`Deleted "${nm}"`);r();
  }));
  document.querySelectorAll('[data-view]').forEach(card=>card.addEventListener('click',e=>{

  g('det-bg')?.addEventListener('click',e=>{if(e.target.id==='det-bg'){S.detail=null;S.showOrder=false;r();}});
  document.querySelectorAll('[data-di]').forEach(th=>th.addEventListener('click',e=>{
    e.stopPropagation();S.detailImg=+th.dataset.di;

  g('det-prev')?.addEventListener('click',e=>{
    e.stopPropagation();const n=S.detail.imgs.length;S.detailImg=(S.detailImg-1+n)%n;
    const mi=g('det-main');if(mi)mi.src=S.detail.imgs[S.detailImg];

  g('det-next')?.addEventListener('click',e=>{

    const mi=g('det-main');if(mi)mi.src=S.detail.imgs[S.detailImg];

  }));
  g('det-order')?.addEventListener('click',()=>{S.showOrder=true;r();});

function doKey(){
  const val=(g('key-inp')?.value||'').trim();
  if(val===KEY){S.unlocked=true;S.modal=null;showToast('Seller mode unlocked ✓');addLog('lock','Seller mode unlocked');r();}
  else{S.keyErr='Incorrect key. Try again.';r();setTimeout(()=>g('key-inp')?.focus(),50);}
}

function doSave(){
  const name=(g('f-name')?.value||'').trim();
  const price=(g('f-price')?.value||'').trim();
  if(!name){g('f-name')?.focus();return;}
  if(!price){g('f-price')?.focus();return;}
  const sizes=(g('f-sizes')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);
  const shirt={name,price,sizes,desc:(g('f-desc')?.value||'').trim(),stock:g('f-stock')?.value||'in',tag:(g('f-tag')?.value||'').trim(),imgs:[...S.form.imgs]};
  if(S.editId){
    S.shirts=S.shirts.map(s=>s.id===S.editId?{...s,...shirt}:s);
    saveShirts();showToast('Shirt updated ✓');addLog('edit',`Edited "${name}"`);
  } else {
    // FIX #4: use Date.now() + random suffix to avoid ID collisions
    shirt.id=Date.now()+'_'+Math.random().toString(36).slice(2,7);
    S.shirts.push(shirt);saveShirts();showToast('Shirt added! ✓');addLog('add',`Added new shirt "${name}" at ${price}`);
  }
  S.modal=null;r();
}

        <div class="dstat-sub">${S.shirts.filter(s=>s.stock==='out').length} sold out</div>
      </div>
    </div>

    <div class="chart-panel">
      <div class="chart-panel-head">
        <div class="chart-panel-title">💰 Purchase Power (Revenue per Day)<span id="chart-last-updated"></span></div>
        <div class="chart-range-pills">
          <button class="crpill${S.chartRange==='7d'?' active':''}" data-range="7d">7D</button>
          <button class="crpill${S.chartRange==='14d'?' active':''}" data-range="14d">14D</button>
          <button class="crpill${S.chartRange==='30d'?' active':''}" data-range="30d">30D</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="sales-chart"></canvas></div>
    </div>

    <div class="log-panel">
      <div class="log-panel-head">
        <div class="log-panel-title">📋 Activity Log</div>
        <span style="font-size:11px;color:var(--text3)">${loadLog().length} entries</span>
      </div>
      ${logListHtml()}
    </div>
  </div>`;
}

function logListHtml(){
  const log=loadLog();
  if(!log.length)return`<div class="log-empty">No activity yet — actions will appear here.</div>`;
  const iconMap={add:'➕',edit:'✏️',del:'🗑️',sale:'💸',lock:'🔑'};
  return`<div class="log-list">${log.map(l=>`
    <div class="log-item">
      <div class="log-icon ${l.type}">${iconMap[l.type]||'•'}</div>
      <div class="log-meta">
        <div class="log-action">${escHtml(l.action)}</div>
        <div class="log-time">${fmtTs(l.ts)}</div>
      </div>
    </div>`).join('')}</div>`;
}

function fmtTs(ts){
  const d=new Date(ts);
  const now=new Date();
  const diff=Math.floor((now-d)/1000);
  if(diff<60)return'Just now';
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  return d.toLocaleDateString('en-PH',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
}

function saleModalHtml(){
  if(!S.showSaleModal)return'';
  const sf=S.saleForm;
  return`<div class="modal-outer" id="sale-bg">
    <div class="sale-modal">
      <div class="sale-head">
        <span style="font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--text)">💸 Record a Sale</span>
        <button class="btn-icon" id="sale-close">✕</button>
      </div>
      <div class="sale-body">
        <div class="field"><label>Shirt / Item Name *</label>
          <select id="s-shirt">
            <option value="">— Select shirt —</option>
            ${S.shirts.map(sh=>`<option value="${escHtml(sh.name)}"${sf.shirt===sh.name?' selected':''}>${sh.stock==='out'?'[SOLD OUT] ':''}${escHtml(sh.name)} (${escHtml(sh.price)})</option>`).join('')}
            <option value="__custom__"${sf.shirt==='__custom__'?' selected':''}>Custom item…</option>
          </select>
        </div>
        <div id="s-stock-warning" style="display:${(sf.shirt&&sf.shirt!=='__custom__'&&S.shirts.find(s=>s.name===sf.shirt)?.stock==='out')?'flex':'none'};align-items:center;gap:8px;background:rgba(255,77,77,.08);border:1px solid rgba(255,77,77,.25);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--danger);margin-bottom:10px;font-weight:600;">
          ⚠️ This item is already marked <strong style="margin-left:3px">Sold Out</strong>. Recording a sale will keep it marked as sold out.
        </div>
        <div id="s-instock-notice" style="display:${(sf.shirt&&sf.shirt!=='__custom__'&&S.shirts.find(s=>s.name===sf.shirt)?.stock==='in')?'flex':'none'};align-items:center;gap:8px;background:rgba(57,211,83,.07);border:1px solid rgba(57,211,83,.2);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--success);margin-bottom:10px;font-weight:600;">
          ✅ Recording this sale will automatically mark this item as <strong style="margin-left:3px">Sold Out</strong>.
        </div>
        <div id="s-custom-wrap" style="${sf.shirt==='__custom__'?'':'display:none'}">
          <div class="field"><label>Custom item name *</label>
            <!-- FIX #7: customName is now in state so it survives re-renders -->
            <input id="s-custom-name" value="${escHtml(sf.customName||'')}" placeholder="Item name">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div class="field"><label>Amount (₱) *</label><input id="s-amount" type="number" min="0" value="${escHtml(sf.amount)}" placeholder="350"></div>
          <div class="field"><label>Qty</label><input id="s-qty" type="number" min="1" value="${escHtml(sf.qty||'1')}" placeholder="1"></div>
        </div>
        <div class="field"><label>Note (optional)</label><input id="s-note" value="${escHtml(sf.note||'')}" placeholder="e.g. Size M, COD, etc."></div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;font-size:13px;color:var(--text2)">
          Total: <strong style="color:var(--accent);font-family:var(--font-head);font-size:16px">₱${((+sf.amount||0)*(+sf.qty||1)).toLocaleString()}</strong>
        </div>
      </div>
      <div class="sale-foot">
        <button class="btn" id="sale-cancel">Cancel</button>
        <button class="btn btn-primary" id="sale-save">Record Sale ✓</button>
      </div>
    </div>
  </div>`;
}

let _chartInst=null;
function initChart(){
  const canvas=g('sales-chart');
  if(!canvas)return;
  if(_chartInst){_chartInst.destroy();_chartInst=null;}
  const{labels,data,counts,stockLine}=getChartData(S.chartRange);
  const maxVal=Math.max(...data,1);
  const maxCount=Math.max(...counts,1);
  const maxStock=Math.max(...stockLine.filter(v=>v!==null),1);
  _chartInst=new Chart(canvas,{
    type:'line',
    data:{
      labels,
      datasets:[{
        label:'Revenue (₱)',
        data,
        yAxisID:'yRevenue',
        fill:true,
        tension:0.4,
        borderColor:'#C8FF3E',
        borderWidth:2.5,
        pointBackgroundColor:'#C8FF3E',
        pointBorderColor:'#0C0C0F',
        pointBorderWidth:2,
        pointRadius:4,
        pointHoverRadius:6,
        backgroundColor:(ctx)=>{
          const g2=ctx.chart.ctx.createLinearGradient(0,0,0,200);
          g2.addColorStop(0,'rgba(200,255,62,0.22)');
          g2.addColorStop(1,'rgba(200,255,62,0.00)');
          return g2;
        },
      },{
        label:'Purchases',
        data:counts,
        yAxisID:'yCount',
        fill:false,
        tension:0.4,
        borderColor:'#7B8CFF',
        borderWidth:2,
        borderDash:[5,4],
        pointBackgroundColor:'#7B8CFF',
        pointBorderColor:'#0C0C0F',
        pointBorderWidth:2,
        pointRadius:4,
        pointHoverRadius:6,
      },{
        label:'Available Stock',
        data:stockLine,
        yAxisID:'yCount',
        fill:false,
        tension:0,
        stepped:true,
        borderColor:'#FF8C42',
        borderWidth:2,
        borderDash:[3,3],
        pointBackgroundColor:'#FF8C42',
        pointBorderColor:'#0C0C0F',
        pointBorderWidth:2,
        pointRadius:4,
        pointHoverRadius:6,
        spanGaps:true,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{
          display:true,position:'top',align:'end',
          labels:{color:'#9999A8',font:{size:11,family:'DM Sans'},boxWidth:12,boxHeight:2,usePointStyle:false,padding:16}
        },
        tooltip:{
          backgroundColor:'#1C1C21',borderColor:'#2A2A30',borderWidth:1,
          titleColor:'#9999A8',bodyColor:'#F2F2F5',padding:10,
          callbacks:{
            label:ctx=>{
              if(ctx.dataset.label==='Available Stock')return`${ctx.parsed.y} in stock`;
              if(ctx.dataset.yAxisID==='yCount')return`${ctx.parsed.y} purchase${ctx.parsed.y!==1?'s':''}`;
              return`₱${ctx.parsed.y.toLocaleString()}`;
            }
          }
        }
      },
      scales:{
        x:{grid:{color:'rgba(42,42,48,0.6)',drawBorder:false},ticks:{color:'#5A5A68',font:{size:11,family:'DM Sans'}},border:{display:false}},
        yRevenue:{position:'left',grid:{color:'rgba(42,42,48,0.6)',drawBorder:false},ticks:{color:'#5A5A68',font:{size:11,family:'DM Sans'},callback:v=>'₱'+v.toLocaleString()},border:{display:false},beginAtZero:true,suggestedMax:maxVal*1.2||500},
        yCount:{position:'right',grid:{drawOnChartArea:false},ticks:{color:'#9999A8',font:{size:11,family:'DM Sans'},stepSize:1,callback:v=>Number.isInteger(v)?v:''},border:{display:false},beginAtZero:true,suggestedMax:Math.max(maxCount,maxStock)+2||5}
      }
    }
  });
}

function refreshChart(){
  if(!S.unlocked)return;
  saveStockSnapshot();
  if(!_chartInst){initChart();return;}
  const{labels,data,counts,stockLine}=getChartData(S.chartRange);
  _chartInst.data.labels=labels;
  _chartInst.data.datasets[0].data=data;
  _chartInst.data.datasets[1].data=counts;
  _chartInst.data.datasets[2].data=stockLine;
  _chartInst.update('active');
  const panel=document.querySelector('.chart-panel');
  if(panel){panel.classList.remove('chart-flash');void panel.offsetWidth;panel.classList.add('chart-flash');}
  const lbl=g('chart-last-updated');
  if(lbl){lbl.textContent=' · Updated '+fmtTs(Date.now());lbl.classList.add('just-updated');setTimeout(()=>lbl.classList.remove('just-updated'),2000);}
}

function bindDash(){
  document.querySelectorAll('[data-range]').forEach(b=>b.addEventListener('click',()=>{
    S.chartRange=b.dataset.range;
    document.querySelectorAll('.crpill').forEach(p=>p.classList.toggle('active',p.dataset.range===S.chartRange));
    initChart();
  }));
  g('btn-record-sale')?.addEventListener('click',()=>{
    S.showSaleModal=true;
    // FIX #7: reset customName in state too
    S.saleForm={shirt:'',amount:'',qty:'1',note:'',customName:''};
    r();
  });
  g('btn-clear-log')?.addEventListener('click',()=>{
    if(!confirm('Clear all activity log entries?'))return;
    localStorage.removeItem('driplive_log');
    // Also clear Firebase log
    if(FB_READY&&logRef){logRef.remove().catch(e=>console.warn('Log clear failed:',e));}
    showToast('Activity log cleared.');r();
  });
  g('btn-print-dash')?.addEventListener('click',()=>{window.print();});

  g('sale-close')?.addEventListener('click',()=>{S.showSaleModal=false;r();});
  g('sale-cancel')?.addEventListener('click',()=>{S.showSaleModal=false;r();});
  g('sale-bg')?.addEventListener('click',e=>{if(e.target.id==='sale-bg'){S.showSaleModal=false;r();}});
  g('s-shirt')?.addEventListener('change',e=>{
    S.saleForm.shirt=e.target.value;
    const wrap=g('s-custom-wrap');
    if(wrap)wrap.style.display=e.target.value==='__custom__'?'':'none';
    if(e.target.value&&e.target.value!=='__custom__'){
      const sh=S.shirts.find(s=>s.name===e.target.value);
      if(sh){const p=sh.price.replace(/[^\d]/g,'');if(p){const amtEl=g('s-amount');if(amtEl)amtEl.value=p;}S.saleForm.amount=sh.price.replace(/[^\d]/g,'')||'';}
      const shirtData=S.shirts.find(s=>s.name===e.target.value);
      const warn=g('s-stock-warning');const notice=g('s-instock-notice');
      if(warn)warn.style.display=shirtData?.stock==='out'?'flex':'none';
      if(notice)notice.style.display=shirtData?.stock==='in'?'flex':'none';
    } else {
      const warn=g('s-stock-warning');const notice=g('s-instock-notice');
      if(warn)warn.style.display='none';if(notice)notice.style.display='none';
    }
    updateSaleTotal();
  });
  // FIX #7: also save customName to state on input
  g('s-custom-name')?.addEventListener('input',e=>{S.saleForm.customName=e.target.value;});
  g('s-amount')?.addEventListener('input',e=>{S.saleForm.amount=e.target.value;updateSaleTotal();});
  g('s-qty')?.addEventListener('input',e=>{S.saleForm.qty=e.target.value;updateSaleTotal();});
  g('sale-save')?.addEventListener('click',doRecordSale);
}

function updateSaleTotal(){
  const a=+(g('s-amount')?.value||0);
  const q=+(g('s-qty')?.value||1);
  const el=document.querySelector('#sale-bg strong');
  if(el)el.textContent='₱'+(a*q).toLocaleString();
}

function doRecordSale(){
  const shirtSel=g('s-shirt')?.value||'';
  // FIX #7: read customName from state (survives re-renders) with fallback to input
  let name=shirtSel==='__custom__'
    ?(S.saleForm.customName||(g('s-custom-name')?.value||'')).trim()
    :shirtSel;
  const amount=+(g('s-amount')?.value||0);
  const qty=Math.max(1,+(g('s-qty')?.value||1));
  const note=(g('s-note')?.value||'').trim();
  if(!name){showToast('Please select or enter an item.');return;}
  if(!amount||amount<=0){showToast('Please enter a valid amount.');return;}
  addSale(name+(note?` (${note})`:''),amount,qty);
  // FIX #3: handle already-sold-out case with explicit warning
  if(shirtSel&&shirtSel!=='__custom__'){
    const idx=S.shirts.findIndex(s=>s.name===shirtSel);
    if(idx>=0){
      if(S.shirts[idx].stock==='in'){
        S.shirts[idx].stock='out';
        saveShirts();
        addLog('edit',`Auto-marked "${S.shirts[idx].name}" as Sold Out after sale`);
        showToast(`Sale recorded & "${S.shirts[idx].name}" marked Sold Out ✓`);
      } else {
        // FIX #3: was already sold out — record sale but make it clear
        addLog('sale',`Sale recorded for already-sold-out item: "${S.shirts[idx].name}"`);
        showToast(`⚠️ Sale recorded (item was already Sold Out) ₱${(amount*qty).toLocaleString()} ✓`);
      }
    } else {
      showToast(`Sale recorded! ₱${(amount*qty).toLocaleString()} ✓`);
    }
  } else {
    showToast(`Sale recorded! ₱${(amount*qty).toLocaleString()} ✓`);
  }
  S.showSaleModal=false;r();
}

// FIX #10: r() uses refreshChart() instead of initChart() to avoid chart flicker on every re-render
function r(){
  document.getElementById('app').innerHTML=view();
  bind();
  if(S.unlocked){
    bindDash();
    if(!_chartInst){initChart();}
    else{refreshChart();}
  }
}
r();
</script>
</body>
</html>
